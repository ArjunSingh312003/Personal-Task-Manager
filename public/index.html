<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow – Personal Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════════
     TOAST  (top-right notifications)
═══════════════════════════════════════════════ -->
<div id="toasts"></div>

<!-- ═══════════════════════════════════════════════
     HEADER
═══════════════════════════════════════════════ -->
<div class="page">

  <header class="header">
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="6" height="6" rx="1"/><rect x="3" y="13" width="6" height="6" rx="1"/><line x1="13" y1="6" x2="21" y2="6"/><line x1="13" y1="14" x2="21" y2="14"/><line x1="13" y1="18" x2="21" y2="18"/></svg>
      <span>TaskFlow</span>
    </div>
    <button id="themeBtn" title="Toggle theme">🌙</button>
  </header>

  <!-- ═══════════════════════════════════════════
       STATS CARDS
  ═══════════════════════════════════════════ -->
  <div class="stats-row">
    <div class="card stats-main">
      <div>
        <p class="label">COMPLETION</p>
        <p class="big-num"><span id="statDone">0</span><span class="muted"> / <span id="statTotal">0</span></span></p>
        <p id="statMsg" class="small-text">No tasks yet — add one below!</p>
      </div>
      <!-- SVG ring -->
      <div class="ring-wrap">
        <svg width="76" height="76">
          <circle cx="38" cy="38" r="30" class="ring-bg"/>
          <circle cx="38" cy="38" r="30" class="ring-fg" id="ring"
                  stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
        </svg>
        <span id="ringPct" class="ring-text">0%</span>
      </div>
    </div>

    <div class="card stats-side">
      <div class="stat-col" style="border-right:1px solid var(--border)">
        <span class="label">ACTIVE</span>
        <span id="statActive" class="big-num">0</span>
      </div>
      <div class="stat-col">
        <span class="label">DONE</span>
        <span id="statComp" class="big-num">0</span>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       ADD TASK PANEL
  ═══════════════════════════════════════════ -->
  <div class="card add-panel" id="addPanel">
    <input id="newTitle" class="input-bare" placeholder="＋ Add a new task…" autocomplete="off" />
    <div id="extraFields" class="extra hidden">
      <textarea id="newDesc" class="input-bare textarea" placeholder="Description (optional)…" rows="2"></textarea>
      <div class="add-footer">
        <label class="date-label">
          📅 Due&nbsp;
          <input type="date" id="newDue" class="date-input" />
        </label>
        <div class="btn-group">
          <button class="btn ghost" id="clearBtn">Clear</button>
          <button class="btn primary" id="addBtn" disabled>＋ Add Task</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       TOOLBAR  (filter tabs + search)
  ═══════════════════════════════════════════ -->
  <div class="toolbar">
    <div class="tabs">
      <button class="tab active" data-f="all">All</button>
      <button class="tab" data-f="active">Active</button>
      <button class="tab" data-f="completed">Completed</button>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" class="search-input" placeholder="Search… (press /)" />
      <button id="clearSearch" class="clear-search hidden">✕</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       TASK LIST  /  EMPTY STATE  /  LOADER
  ═══════════════════════════════════════════ -->
  <div id="loader" class="loader hidden">
    <div class="spinner"></div> Loading…
  </div>

  <ul id="taskList"></ul>

  <div id="empty" class="empty hidden">
    <div class="empty-icon">📋</div>
    <h2 id="emptyTitle">Nothing here!</h2>
    <p  id="emptyMsg">Add your first task above.</p>
  </div>

</div><!-- /page -->

<!-- ═══════════════════════════════════════════════
     EDIT MODAL
═══════════════════════════════════════════════ -->
<div id="editModal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-head">
      <h3>Edit Task</h3>
      <button class="modal-close" onclick="closeModal('editModal')">✕</button>
    </div>
    <form id="editForm">
      <input type="hidden" id="editId" />
      <label class="field-label">Title *</label>
      <input id="editTitle" class="field-input" required placeholder="Task title" />
      <label class="field-label">Description</label>
      <textarea id="editDesc" class="field-input" rows="3" placeholder="Details…"></textarea>
      <label class="field-label">Due Date</label>
      <input type="date" id="editDue" class="field-input" />
      <div class="modal-footer">
        <button type="button" class="btn ghost" onclick="closeModal('editModal')">Cancel</button>
        <button type="submit" class="btn primary">💾 Save</button>
      </div>
    </form>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     DELETE MODAL
═══════════════════════════════════════════════ -->
<div id="delModal" class="modal-backdrop hidden">
  <div class="modal" style="max-width:380px">
    <div class="modal-head">
      <h3 style="color:var(--red)">🗑 Delete Task?</h3>
      <button class="modal-close" onclick="closeModal('delModal')">✕</button>
    </div>
    <p>Are you sure you want to permanently delete <strong id="delName"></strong>?</p>
    <div class="modal-footer" style="margin-top:1.5rem">
      <button class="btn ghost" onclick="closeModal('delModal')">Cancel</button>
      <button id="delConfirm" class="btn danger">🗑 Delete</button>
    </div>
  </div>
</div>

<!-- link to our JS file — must be at end of body -->
<script src="app.js"></script>
</body>
</html>
